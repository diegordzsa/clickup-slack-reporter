name: Daily Report

on:
  schedule:
    # 6:00 AM hora España = 4:00 UTC en horario verano, 5:00 UTC en invierno
    # Usamos 5:00 UTC para que en invierno sea 6:00 AM exacto
    # En verano sera 7:00 AM (aceptable, 1 hora de drift)
    - cron: '17 5 * * *'
  workflow_dispatch:  # Permite correr manualmente desde GitHub

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Necesario para commitear el snapshot

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          CLICKUP_TEAM_ID: ${{ secrets.CLICKUP_TEAM_ID }}
          CLICKUP_FOLDER_ID_HAIRBIOLABS: ${{ secrets.CLICKUP_FOLDER_ID_HAIRBIOLABS }}
          CLICKUP_FOLDER_ID_SKINPLUS: ${{ secrets.CLICKUP_FOLDER_ID_SKINPLUS }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: Commit snapshot and transitions log
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # last_snapshot.json siempre existe despues de un run exitoso.
          # transitions_log.jsonl puede no existir si nunca se appendeo nada.
          git add data/last_snapshot.json
          if [ -f data/transitions_log.jsonl ]; then
            git add data/transitions_log.jsonl
          fi
          git diff --staged --quiet || git commit -m "Update snapshot $(date -u +%Y-%m-%d)"
          git push
